# Demo server config for Vemory.
# ./bin/vemory -c demo/vemory.demo.ini

[server]
port = 6379
bind = 0.0.0.0

[logging]
level = info

[storage]
kv_reserve = 10000

[index]
default_capacity = 256

[persistence]
# Snapshot files under demo/data/ (gitignored via demo/data/)
dir = demo/data
# Required for 03_rdb.py verify after restart
load_on_startup = true
