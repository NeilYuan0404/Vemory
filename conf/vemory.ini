# Vemory server configuration (INI).
# Load with: ./bin/vemory -c conf/vemory.ini
# A positional port argument overrides server.port.

[server]
port = 6379
bind = 0.0.0.0

[logging]
# trace | debug | info | warn | error | critical | off
level = info

[storage]
kv_reserve = 100000

[index]
default_capacity = 1024

[persistence]
# Snapshot directory (dump.meta / dump.kv / dump.nodes / dump.usearch)
dir = data
# Load dump.* from dir on startup when files exist
load_on_startup = false
