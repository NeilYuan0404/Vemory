# Vemory AOF instance for aof_bench.py (port 8990).
# Separate persistence.dir so files do not clash with conf/vemory.ini.

[server]
port = 8990
bind = 0.0.0.0

[logging]
level = info

[storage]
kv_reserve = 100000

[index]
default_capacity = 1024

[persistence]
dir = data_aof_bench
load_on_startup = false
aof = true
